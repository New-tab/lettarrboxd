services:
  # V2: single container with multiple URLs (recommended)
  seerrboxd:
    image: ryanpage/seerrboxd:latest
    container_name: seerrboxd
    ports:
      - "3000:3000"
    environment:
      # Comma-separated list: request-mode and/or delete-mode URLs
      - LETTERBOXD_URLS=https://letterboxd.com/your_username/watchlist/,https://letterboxd.com/your_username/films/diary/
      - SEERR_API_URL=http://seerr:5055
      - SEERR_API_KEY=your_seerr_api_key
      - NODE_ENV=production
      - LOG_LEVEL=info
      - CHECK_INTERVAL_MINUTES=60
      - DATA_DIR=/data
      - MEDIA_MOUNT_SENTINEL=/mnt/media/.MOUNT_OK
      # Status/control endpoint port (default: 3000)
      # - PORT=3000
      # Optional movie limiting for request-mode sources (both required if using)
      # - LETTERBOXD_TAKE_AMOUNT=10
      # - LETTERBOXD_TAKE_STRATEGY=newest
    volumes:
      - ./data:/data
    restart: unless-stopped

  # Legacy: single LETTERBOXD_URL still works for backward compatibility
